# Prerelease publish workflow
#
# dev     → alpha packages → GitHub Packages (restricted, internal only)
# staging → beta packages  → GitHub Packages (public) + GitHub pre-release
#                            with SEA bins attached to a draft release.
#                            Manual `Publish Beta to npm` then publishes to
#                            npm and flips the draft to published.
#
# Trigger model:
#   - `push` to dev/staging → fires immediately. The wait-for-ci job below
#     polls the CI workflow on the same commit and only allows the publish
#     job to start once CI succeeds.
#   - workflow_dispatch is also supported as a manual fallback.
#
#   We use push + wait-for-ci instead of workflow_run because workflow_run
#   only fires when the workflow file is on the default branch (main). For
#   a workflow that needs to react to CI on dev/staging, the trigger must
#   be on the same branch the push lands on, which is what `push` gives us.
#
# Version scheme: the prerelease base is the *next* semver computed by
# analyzing commits since the last release tag (breaking → minor,
# feat/fix/perf → patch).
# The base is always derived from main's current version so branch divergence
# does not corrupt the stamp.
# e.g. main@0.1.5, feat commit in dev → alpha: 0.1.6-alpha.42
#
# IMPORTANT: versions are stamped into package.json BEFORE the build so that
# esbuild bakes the correct version into the CLI bundle (clef --version).
#
# Inside the publish job, SEA build is dispatched in the background BEFORE
# build/test, then waited for AFTER build/test. This means SEA runs in
# parallel with the publish job's own build/test instead of blocking it.

name: Publish Prerelease

on:
  push:
    branches: [dev, staging]
  workflow_dispatch:

permissions:
  contents: write # create GitHub releases on staging + commit version stamps
  packages: write # publish to GitHub Packages
  actions: write # query CI workflow status + dispatch build-sea on staging

concurrency:
  group: prerelease-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # Gate: wait for the CI workflow (including the full E2E matrix) to pass
  # before publishing. This replaces workflow_run which only works when the
  # workflow file is on the default branch.
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow to succeed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for CI workflow on $GITHUB_SHA ..."
          for i in $(seq 1 90); do
            RUN=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --commit "$GITHUB_SHA" \
              --json databaseId,conclusion,status \
              --jq '.[0]')

            STATUS=$(echo "$RUN" | jq -r '.status // "not_found"')
            CONCLUSION=$(echo "$RUN" | jq -r '.conclusion // "pending"')

            if [ "$CONCLUSION" = "success" ]; then
              echo "CI passed ✓"
              exit 0
            elif [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ]; then
              echo "::error::CI $CONCLUSION — aborting publish"
              exit 1
            fi

            echo "CI status=$STATUS conclusion=$CONCLUSION — waiting (attempt $i/90)..."
            sleep 20
          done
          echo "::error::Timed out waiting for CI after 30 minutes"
          exit 1

  publish:
    name: Publish ${{ github.ref_name == 'dev' && 'Alpha' || 'Beta' }}
    needs: wait-for-ci
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'dev' && 'dev' || 'staging' }}
    env:
      BRANCH: ${{ github.ref_name }}
      HEAD_SHA: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@clef-sh"

      - run: npm ci

      - name: Compute and stamp prerelease versions
        id: ver
        run: |
          if [ "$BRANCH" = "dev" ]; then
            PRE="alpha"
            DIST_TAG="alpha"
          else
            PRE="beta"
            DIST_TAG="beta"
          fi

          # Snapshot each package's version from main as the stable baseline.
          # For new packages not yet on main, fall back to the current branch version.
          git show origin/main:packages/core/package.json  > /tmp/core-main.json
          git show origin/main:packages/cli/package.json   > /tmp/cli-main.json
          git show origin/main:packages/runtime/package.json > /tmp/runtime-main.json 2>/dev/null \
            || cp packages/runtime/package.json /tmp/runtime-main.json
          git show origin/main:packages/agent/package.json > /tmp/agent-main.json 2>/dev/null \
            || cp packages/agent/package.json /tmp/agent-main.json
          git show origin/main:packages/broker/package.json > /tmp/broker-main.json 2>/dev/null \
            || cp packages/broker/package.json /tmp/broker-main.json
          git show origin/main:packages/ui/package.json    > /tmp/ui-main.json 2>/dev/null \
            || cp packages/ui/package.json /tmp/ui-main.json
          git show origin/main:packages/cloud/package.json > /tmp/cloud-main.json 2>/dev/null \
            || cp packages/cloud/package.json /tmp/cloud-main.json
          git show origin/main:packages/analytics/package.json > /tmp/analytics-main.json 2>/dev/null \
            || cp packages/analytics/package.json /tmp/analytics-main.json
          git show origin/main:packages/client/package.json > /tmp/client-main.json 2>/dev/null \
            || cp packages/client/package.json /tmp/client-main.json

          # Compute the next semver for a package by replaying the same bump rules
          # used by the release workflow against commits since the last release tag.
          #
          # Rules:
          #   breaking change (! suffix or BREAKING CHANGE footer) → minor bump
          #   feat / fix / perf                                     → patch bump
          #
          # Falls back to a patch bump when there are no conventional commits,
          # so the prerelease label always sits ahead of the last stable release.
          #
          # Release tags follow the pattern: @clef-sh/<name>-v<version>
          next_version() {
            local PKG_NAME="$1"  # e.g. @clef-sh/core
            local PKG_DIR="$2"   # e.g. packages/core
            local BASE="$3"      # e.g. 0.1.5 (stripped from main)

            local LAST_TAG
            LAST_TAG=$(git tag --list "${PKG_NAME}@*" --sort=-version:refname 2>/dev/null | head -1)
            local FROM="${LAST_TAG:-$(git rev-list --max-parents=0 HEAD)}"

            # Inspect commit subjects and bodies for breaking-change markers.
            local MSGS
            MSGS=$(git log "${FROM}..HEAD" --format="%s%n%b" -- "${PKG_DIR}/")

            local BUMP="patch"
            if echo "$MSGS" | grep -qE "^.+(\(.+\))?!:|^BREAKING CHANGE"; then
              BUMP="minor"
            fi

            local MAJ MIN PAT
            MAJ=$(echo "$BASE" | cut -d. -f1)
            MIN=$(echo "$BASE" | cut -d. -f2)
            PAT=$(echo "$BASE" | cut -d. -f3)

            if [ "$BUMP" = "minor" ]; then
              MIN=$((MIN + 1)); PAT=0
            else
              PAT=$((PAT + 1))
            fi

            echo "${MAJ}.${MIN}.${PAT}"
          }

          CORE_BASE=$(node -p "require('/tmp/core-main.json').version.replace(/-.*/, '')")
          CLOUD_BASE=$(node -p "require('/tmp/cloud-main.json').version.replace(/-.*/, '')")
          ANALYTICS_BASE=$(node -p "require('/tmp/analytics-main.json').version.replace(/-.*/, '')")
          RUNTIME_BASE=$(node -p "require('/tmp/runtime-main.json').version.replace(/-.*/, '')")
          CLI_BASE=$(node -p "require('/tmp/cli-main.json').version.replace(/-.*/, '')")
          AGENT_BASE=$(node -p "require('/tmp/agent-main.json').version.replace(/-.*/, '')")
          BROKER_BASE=$(node -p "require('/tmp/broker-main.json').version.replace(/-.*/, '')")
          UI_BASE=$(node -p "require('/tmp/ui-main.json').version.replace(/-.*/, '')")
          CLIENT_BASE=$(node -p "require('/tmp/client-main.json').version.replace(/-.*/, '')")

          CORE_NEXT=$(next_version    "@clef-sh/core"    "packages/core"    "$CORE_BASE")
          CLOUD_NEXT=$(next_version     "@clef-sh/cloud"     "packages/cloud"     "$CLOUD_BASE")
          ANALYTICS_NEXT=$(next_version "@clef-sh/analytics" "packages/analytics" "$ANALYTICS_BASE")
          RUNTIME_NEXT=$(next_version   "@clef-sh/runtime"   "packages/runtime"   "$RUNTIME_BASE")
          CLI_NEXT=$(next_version     "@clef-sh/cli"     "packages/cli"     "$CLI_BASE")
          AGENT_NEXT=$(next_version   "@clef-sh/agent"   "packages/agent"   "$AGENT_BASE")
          BROKER_NEXT=$(next_version  "@clef-sh/broker"  "packages/broker"  "$BROKER_BASE")
          UI_NEXT=$(next_version      "@clef-sh/ui"      "packages/ui"      "$UI_BASE")
          CLIENT_NEXT=$(next_version "@clef-sh/client"  "packages/client"  "$CLIENT_BASE")

          CORE_VER="${CORE_NEXT}-${PRE}.${{ github.run_number }}"
          CLOUD_VER="${CLOUD_NEXT}-${PRE}.${{ github.run_number }}"
          ANALYTICS_VER="${ANALYTICS_NEXT}-${PRE}.${{ github.run_number }}"
          RUNTIME_VER="${RUNTIME_NEXT}-${PRE}.${{ github.run_number }}"
          CLI_VER="${CLI_NEXT}-${PRE}.${{ github.run_number }}"
          AGENT_VER="${AGENT_NEXT}-${PRE}.${{ github.run_number }}"
          BROKER_VER="${BROKER_NEXT}-${PRE}.${{ github.run_number }}"
          UI_VER="${UI_NEXT}-${PRE}.${{ github.run_number }}"
          CLIENT_VER="${CLIENT_NEXT}-${PRE}.${{ github.run_number }}"

          # Stamp package.json files NOW, before the build, so that esbuild
          # bakes the correct version string into the CLI bundle. The CLI reads
          # its version via `import pkg from "../package.json"` at compile time.
          stamp() { node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('$1/package.json', 'utf8'));
            p.version = '$2';
            fs.writeFileSync('$1/package.json', JSON.stringify(p, null, 2) + '\n');
          "; }

          stamp packages/core    "$CORE_VER"
          stamp packages/cloud     "$CLOUD_VER"
          stamp packages/analytics "$ANALYTICS_VER"
          stamp packages/runtime   "$RUNTIME_VER"
          stamp packages/cli     "$CLI_VER"
          stamp packages/agent   "$AGENT_VER"
          stamp packages/broker  "$BROKER_VER"
          stamp packages/ui      "$UI_VER"
          stamp packages/client  "$CLIENT_VER"

          echo "dist_tag=${DIST_TAG}"            >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRE}"               >> "$GITHUB_OUTPUT"
          echo "core_version=${CORE_VER}"        >> "$GITHUB_OUTPUT"
          echo "cloud_version=${CLOUD_VER}"          >> "$GITHUB_OUTPUT"
          echo "analytics_version=${ANALYTICS_VER}"  >> "$GITHUB_OUTPUT"
          echo "runtime_version=${RUNTIME_VER}"      >> "$GITHUB_OUTPUT"
          echo "cli_version=${CLI_VER}"          >> "$GITHUB_OUTPUT"
          echo "agent_version=${AGENT_VER}"      >> "$GITHUB_OUTPUT"
          echo "broker_version=${BROKER_VER}"    >> "$GITHUB_OUTPUT"
          echo "ui_version=${UI_VER}"            >> "$GITHUB_OUTPUT"
          echo "client_version=${CLIENT_VER}"    >> "$GITHUB_OUTPUT"

      # Beta: pre-create the git tag at HEAD_SHA and push it. We need a
      # real git tag (not just a release object) because build-sea checks
      # the tag out via actions/checkout. `gh release create --draft`
      # does NOT push the underlying tag — draft releases hold the tag
      # internally and only push it when the release is published. So we
      # create and push the tag ourselves first, then the next step
      # creates a draft release that simply attaches to the existing tag.
      #
      # Idempotent: skip if the tag already exists locally or remotely.
      - name: Create git tag (beta)
        if: env.BRANCH == 'staging'
        run: |
          CLI_VER="${{ steps.ver.outputs.cli_version }}"
          TAG="v${CLI_VER}"

          if git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists locally — skipping"
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on remote — fetching"
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" || true
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "$HEAD_SHA"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG → $HEAD_SHA"

      # Beta: create the draft pre-release BEFORE build/test so SEA can be
      # dispatched immediately. The draft is invisible to users until
      # publish-beta-npm flips it. The tag was already created and pushed
      # by the previous step, so we don't need --target.
      # Idempotent — if the draft already exists from a previous run attempt,
      # leave it alone.
      - name: Create GitHub pre-release (beta)
        if: env.BRANCH == 'staging'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLI_VER="${{ steps.ver.outputs.cli_version }}"
          if gh release view "v${CLI_VER}" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Draft release v${CLI_VER} already exists — leaving in place"
            exit 0
          fi
          gh release create "v${CLI_VER}" \
            --draft \
            --prerelease \
            --title "v${CLI_VER} (beta)" \
            --notes "Beta release. Available on GitHub Packages.

          SEA binaries (CLI + agent, 5 platforms each) plus the agent Lambda layer are attached below.

          To promote to npm for public testing, trigger the **Publish Beta to npm** workflow."
          echo "Created draft release: v${CLI_VER}"

      # Beta: dispatch the SEA build NOW so it runs in parallel with this
      # job's own build/test. The "Wait for SEA build" step further down
      # blocks until the dispatched run finishes — by which time it may
      # already be done.
      #
      # Idempotent: if the draft already has a complete set of SEA bins
      # (from a successful previous run attempt), skip the dispatch.
      - name: Dispatch SEA build (beta, background)
        if: env.BRANCH == 'staging'
        id: dispatch_sea
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLI_VER="${{ steps.ver.outputs.cli_version }}"
          TAG="v${CLI_VER}"

          # Idempotency check: if every expected SEA bin is already attached
          # to the draft, this step is already done.
          EXPECTED_ASSETS=(
            clef-linux-x64 clef-linux-arm64 clef-darwin-x64 clef-darwin-arm64 clef-windows-x64.exe
            clef-agent-linux-x64 clef-agent-linux-arm64 clef-agent-darwin-x64 clef-agent-darwin-arm64 clef-agent-windows-x64.exe
          )
          ASSETS=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || echo "")
          ALL_PRESENT=true
          for asset in "${EXPECTED_ASSETS[@]}"; do
            if ! echo "$ASSETS" | grep -qx "$asset"; then
              ALL_PRESENT=false
              break
            fi
          done
          if [ "$ALL_PRESENT" = "true" ]; then
            echo "All ${#EXPECTED_ASSETS[@]} SEA bins already attached to $TAG — skipping dispatch"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Capture the latest build-sea run ID before dispatching so the
          # later "Wait for SEA build" step can identify the run we triggered.
          BEFORE=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow build-sea.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // 0')
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"

          gh workflow run build-sea.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref staging \
            -f tag="$TAG"
          echo "Dispatched build-sea for tag $TAG (running in background)"

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test

      # Beta: wait for the SEA build dispatched earlier. By this point in
      # the job, build/test has run in parallel with the SEA build, so the
      # SEA may already be done.
      - name: Wait for SEA build (beta)
        if: env.BRANCH == 'staging' && steps.dispatch_sea.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE="${{ steps.dispatch_sea.outputs.before }}"

          # Find the run ID we just dispatched (any new run with ID > BEFORE).
          NEW_RUN_ID=""
          for i in $(seq 1 30); do
            CURRENT=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow build-sea.yml \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // 0')
            if [ "$CURRENT" -gt "$BEFORE" ]; then
              NEW_RUN_ID="$CURRENT"
              break
            fi
            sleep 5
          done
          if [ -z "$NEW_RUN_ID" ]; then
            echo "::error::build-sea run did not appear within 2.5 minutes"
            exit 1
          fi
          echo "Tracking build-sea run: $NEW_RUN_ID"
          echo "URL: https://github.com/$GITHUB_REPOSITORY/actions/runs/$NEW_RUN_ID"

          for i in $(seq 1 180); do
            STATUS=$(gh run view "$NEW_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --json status,conclusion \
              --jq '.status')
            CONCLUSION=$(gh run view "$NEW_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --json status,conclusion \
              --jq '.conclusion // "pending"')

            if [ "$CONCLUSION" = "success" ]; then
              echo "build-sea succeeded ✓"
              exit 0
            elif [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ]; then
              echo "::error::build-sea $CONCLUSION — see https://github.com/$GITHUB_REPOSITORY/actions/runs/$NEW_RUN_ID"
              exit 1
            fi

            echo "build-sea status=$STATUS conclusion=$CONCLUSION (attempt $i/180)"
            sleep 20
          done
          echo "::error::Timed out waiting for build-sea after 60 minutes"
          exit 1

      # ── Alpha (dev → GitHub Packages, restricted/internal) ───────────────
      #
      # Each publish step is idempotent: a re-run on a partial failure
      # treats "version already exists" as a warning rather than a hard
      # error, so the workflow can be safely retried via "Re-run failed
      # jobs" without polluting the registry or aborting the rest of the
      # publish loop.

      - name: Publish @clef-sh/core (alpha)
        if: env.BRANCH == 'dev'
        continue-on-error: true
        working-directory: packages/core
        run: npm publish --tag alpha --access restricted --no-provenance || echo "::warning::@clef-sh/core alpha publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/cloud (alpha)
        if: env.BRANCH == 'dev'
        continue-on-error: true
        working-directory: packages/cloud
        run: npm publish --tag alpha --access restricted --no-provenance || echo "::warning::@clef-sh/cloud alpha publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/analytics (alpha)
        if: env.BRANCH == 'dev'
        continue-on-error: true
        working-directory: packages/analytics
        run: npm publish --tag alpha --access restricted --no-provenance || echo "::warning::@clef-sh/analytics alpha publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/runtime (alpha)
        if: env.BRANCH == 'dev'
        continue-on-error: true
        working-directory: packages/runtime
        run: npm publish --tag alpha --access restricted --no-provenance || echo "::warning::@clef-sh/runtime alpha publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/agent (alpha)
        if: env.BRANCH == 'dev'
        continue-on-error: true
        working-directory: packages/agent
        run: npm publish --tag alpha --access restricted --no-provenance || echo "::warning::@clef-sh/agent alpha publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/broker (alpha)
        if: env.BRANCH == 'dev'
        continue-on-error: true
        working-directory: packages/broker
        run: npm publish --tag alpha --access restricted --no-provenance || echo "::warning::@clef-sh/broker alpha publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/cli (alpha)
        if: env.BRANCH == 'dev'
        continue-on-error: true
        working-directory: packages/cli
        run: npm publish --tag alpha --access restricted --no-provenance || echo "::warning::@clef-sh/cli alpha publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/ui (alpha)
        if: env.BRANCH == 'dev'
        continue-on-error: true
        working-directory: packages/ui
        run: npm publish --tag alpha --access restricted --no-provenance || echo "::warning::@clef-sh/ui alpha publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/client (alpha)
        if: env.BRANCH == 'dev'
        continue-on-error: true
        working-directory: packages/client
        run: npm publish --tag alpha --access restricted --no-provenance || echo "::warning::@clef-sh/client alpha publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Beta publish to GitHub Packages (AFTER SEA build) ────────────────
      #
      # Only happens if SEA succeeded above. A SEA failure aborts the
      # workflow before any registry publish, so npm.pkg.github.com is
      # never touched on a broken release. Each step is idempotent
      # ("version already exists" → warning, not failure) so a partial
      # failure mid-loop can be recovered with "Re-run failed jobs".

      - name: Publish @clef-sh/core (beta)
        if: env.BRANCH == 'staging'
        continue-on-error: true
        working-directory: packages/core
        run: npm publish --tag beta --access public --no-provenance || echo "::warning::@clef-sh/core beta publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/cloud (beta)
        if: env.BRANCH == 'staging'
        continue-on-error: true
        working-directory: packages/cloud
        run: npm publish --tag beta --access public --no-provenance || echo "::warning::@clef-sh/cloud beta publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/analytics (beta)
        if: env.BRANCH == 'staging'
        continue-on-error: true
        working-directory: packages/analytics
        run: npm publish --tag beta --access public --no-provenance || echo "::warning::@clef-sh/analytics beta publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/runtime (beta)
        if: env.BRANCH == 'staging'
        continue-on-error: true
        working-directory: packages/runtime
        run: npm publish --tag beta --access public --no-provenance || echo "::warning::@clef-sh/runtime beta publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/agent (beta)
        if: env.BRANCH == 'staging'
        continue-on-error: true
        working-directory: packages/agent
        run: npm publish --tag beta --access public --no-provenance || echo "::warning::@clef-sh/agent beta publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/broker (beta)
        if: env.BRANCH == 'staging'
        continue-on-error: true
        working-directory: packages/broker
        run: npm publish --tag beta --access public --no-provenance || echo "::warning::@clef-sh/broker beta publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/cli (beta)
        if: env.BRANCH == 'staging'
        continue-on-error: true
        working-directory: packages/cli
        run: npm publish --tag beta --access public --no-provenance || echo "::warning::@clef-sh/cli beta publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/ui (beta)
        if: env.BRANCH == 'staging'
        continue-on-error: true
        working-directory: packages/ui
        run: npm publish --tag beta --access public --no-provenance || echo "::warning::@clef-sh/ui beta publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @clef-sh/client (beta)
        if: env.BRANCH == 'staging'
        continue-on-error: true
        working-directory: packages/client
        run: npm publish --tag beta --access public --no-provenance || echo "::warning::@clef-sh/client beta publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version stamps back to branch
        run: |
          if git diff --quiet packages/*/package.json; then
            echo "No version changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            packages/core/package.json \
            packages/cloud/package.json \
            packages/analytics/package.json \
            packages/runtime/package.json \
            packages/cli/package.json \
            packages/agent/package.json \
            packages/broker/package.json \
            packages/ui/package.json \
            packages/client/package.json

          PRE="${{ steps.ver.outputs.prerelease }}"
          CLI_VER="${{ steps.ver.outputs.cli_version }}"
          git commit -m "chore(release): stamp ${PRE} versions (${CLI_VER}) [skip ci]"

          git pull --rebase origin "$BRANCH"
          git push origin "$BRANCH"

      - name: Publish summary
        if: always()
        run: |
          echo "## Prerelease publish" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/core\` | \`${{ steps.ver.outputs.core_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/runtime\` | \`${{ steps.ver.outputs.runtime_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/agent\` | \`${{ steps.ver.outputs.agent_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/broker\` | \`${{ steps.ver.outputs.broker_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/cli\` | \`${{ steps.ver.outputs.cli_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/ui\` | \`${{ steps.ver.outputs.ui_version }}\` (GitHub Packages only) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Registry:** GitHub Packages (\`npm.pkg.github.com\`)" >> "$GITHUB_STEP_SUMMARY"
          echo "**Dist-tag:** \`${{ steps.ver.outputs.dist_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
