# Release workflow — publishes @clef-sh/core, @clef-sh/agent, and @clef-sh/cli
# to npm independently, each versioned by its own commits.
# @clef-sh/ui is also semver'd here but publishes to GitHub Packages only (never npm).
#
# Triggers automatically when the CI workflow passes on main, or manually via
# workflow_dispatch. semantic-release commits version bumps back with [skip ci],
# so CI does not re-run and no release loop occurs.
#
# Release order: core → agent → cli → ui.
# If core publishes a new version, cli's @clef-sh/core devDependency is bumped
# automatically, creating a commit that triggers cli's own semantic-release.
#
# Authentication: uses GitHub Actions OIDC for npm provenance (core/agent/cli).
# UI uses GITHUB_TOKEN for GitHub Packages auth.
# Each package has its own .releaserc.json extending semantic-release-monorepo.

name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  id-token: write
  packages: write
  issues: write
  pull-requests: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # For workflow_run: only proceed if CI succeeded.
    # For workflow_dispatch: always proceed (no workflow_run context).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Release @clef-sh/core
        id: core
        run: |
          BEFORE=$(node -p "require('./package.json').version")
          npx semantic-release
          AFTER=$(node -p "require('./package.json').version")
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$AFTER" >> "$GITHUB_OUTPUT"
          fi
        working-directory: packages/core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Release @clef-sh/agent
        id: agent
        run: |
          BEFORE=$(node -p "require('./package.json').version")
          npx semantic-release
          AFTER=$(node -p "require('./package.json').version")
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$AFTER" >> "$GITHUB_OUTPUT"
          fi
        working-directory: packages/agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Bump @clef-sh/core in cli
        if: steps.core.outputs.released == 'true'
        run: |
          NEW_VERSION="${{ steps.core.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/cli/package.json', 'utf8'));
            pkg.devDependencies['@clef-sh/core'] = '^${NEW_VERSION}';
            fs.writeFileSync('packages/cli/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/cli/package.json
          git commit -m "chore(cli): bump @clef-sh/core to ${NEW_VERSION} [skip ci]"

      - name: Release @clef-sh/cli
        run: npx semantic-release
        working-directory: packages/cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Release @clef-sh/ui (GitHub Packages)
        run: npx semantic-release
        working-directory: packages/ui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
