# Build Single Executable Application (SEA) binaries for @clef-sh/cli
# and @clef-sh/agent, then attach them to the GitHub Release.
#
# Triggered when a release is published (stable or beta) or manually via
# workflow_dispatch for retroactively attaching binaries to an existing release.
#
# Stable releases use per-package tags (@clef-sh/cli@X.Y.Z, @clef-sh/agent@X.Y.Z).
# Beta releases use a shared tag (vX.Y.Z-beta.N) and build both CLI and agent.
#
# SEA embeds the host Node binary, so each platform/arch must build on a
# native runner. The CLI requires UI assets to be built first.

name: Build SEA Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-tag:
    name: Check Tag
    runs-on: ubuntu-latest
    outputs:
      build_cli: ${{ steps.check.outputs.build_cli }}
      build_agent: ${{ steps.check.outputs.build_agent }}
      tag: ${{ steps.check.outputs.tag }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'workflow_dispatch'

      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual dispatch: read version from package.json on the checked-out branch
            VERSION=$(node -p "require('./packages/cli/package.json').version")
            BUILD_CLI=true
            BUILD_AGENT=true
          else
            # Release event: tag_name (has v prefix, e.g. v0.1.6-beta.18)
            RAW="${{ github.event.release.tag_name }}"
            VERSION="${RAW#v}"
            BUILD_CLI=false
            BUILD_AGENT=false

            # Beta versions build both CLI and agent
            if [[ "$VERSION" =~ ^.+-beta\.[0-9]+$ ]]; then
              BUILD_CLI=true
              BUILD_AGENT=true
            fi
            # Stable tags build only the matching package
            if [[ "$RAW" =~ ^@clef-sh/cli@(.+)$ ]]; then
              BUILD_CLI=true
              VERSION="${BASH_REMATCH[1]}"
            fi
            if [[ "$RAW" =~ ^@clef-sh/agent@(.+)$ ]]; then
              BUILD_AGENT=true
              VERSION="${BASH_REMATCH[1]}"
            fi
          fi

          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "build_cli=$BUILD_CLI" >> "$GITHUB_OUTPUT"
          echo "build_agent=$BUILD_AGENT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-cli:
    name: CLI (${{ matrix.label }})
    needs: check-tag
    if: needs.check-tag.outputs.build_cli == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
            binary: clef
            asset: clef-linux-x64
          - label: linux-arm64
            os: ubuntu-24.04-arm
            binary: clef
            asset: clef-linux-arm64
          - label: darwin-x64
            os: macos-14
            binary: clef
            asset: clef-darwin-x64
          - label: darwin-arm64
            os: macos-latest
            binary: clef
            asset: clef-darwin-arm64
          - label: windows-x64
            os: windows-latest
            binary: clef.exe
            asset: clef-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-tag.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Stamp version
        if: needs.check-tag.outputs.version != ''
        shell: bash
        run: |
          VER="${{ needs.check-tag.outputs.version }}"
          for pkg in packages/core packages/runtime packages/cli packages/agent packages/ui; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg/package.json','utf8'));
              p.version = '$VER';
              fs.writeFileSync('$pkg/package.json', JSON.stringify(p, null, 2) + '\n');
            "
          done
          echo "Stamped version $VER"

      - name: Build packages
        shell: bash
        run: |
          npm run build -w packages/core
          npm run build -w packages/ui

      - name: Build SEA binary
        shell: bash
        run: npm run build:sea -w packages/cli

      - name: Rename binary for platform
        shell: bash
        run: mv "packages/cli/dist/${{ matrix.binary }}" "packages/cli/dist/${{ matrix.asset }}"

      - name: Generate checksum
        shell: bash
        run: |
          cd packages/cli/dist
          if command -v sha256sum &> /dev/null; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.check-tag.outputs.tag }}" \
            "packages/cli/dist/${{ matrix.asset }}" \
            "packages/cli/dist/${{ matrix.asset }}.sha256" \
            --clobber

  build-agent:
    name: Agent (${{ matrix.label }})
    needs: check-tag
    if: needs.check-tag.outputs.build_agent == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
            binary: clef-agent
            asset: clef-agent-linux-x64
            lambda_arch: x64
          - label: linux-arm64
            os: ubuntu-24.04-arm
            binary: clef-agent
            asset: clef-agent-linux-arm64
            lambda_arch: arm64
          - label: darwin-x64
            os: macos-14
            binary: clef-agent
            asset: clef-agent-darwin-x64
          - label: darwin-arm64
            os: macos-latest
            binary: clef-agent
            asset: clef-agent-darwin-arm64
          - label: windows-x64
            os: windows-latest
            binary: clef-agent.exe
            asset: clef-agent-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-tag.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Stamp version
        if: needs.check-tag.outputs.version != ''
        shell: bash
        run: |
          VER="${{ needs.check-tag.outputs.version }}"
          for pkg in packages/core packages/runtime packages/agent; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg/package.json','utf8'));
              p.version = '$VER';
              fs.writeFileSync('$pkg/package.json', JSON.stringify(p, null, 2) + '\n');
            "
          done
          echo "Stamped version $VER"

      - name: Build packages
        shell: bash
        run: |
          npm run build -w packages/core
          npm run build -w packages/runtime

      - name: Build SEA binary
        shell: bash
        run: npm run build:sea -w packages/agent

      - name: Rename binary for platform
        shell: bash
        run: mv "packages/agent/dist/${{ matrix.binary }}" "packages/agent/dist/${{ matrix.asset }}"

      - name: Generate checksum
        shell: bash
        run: |
          cd packages/agent/dist
          if command -v sha256sum &> /dev/null; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi

      - name: Package Lambda Layer (Linux only)
        if: matrix.lambda_arch != ''
        shell: bash
        run: |
          LAYER_DIR=$(mktemp -d)
          mkdir -p "$LAYER_DIR/clef-agent" "$LAYER_DIR/extensions"
          cp "packages/agent/dist/${{ matrix.asset }}" "$LAYER_DIR/clef-agent/clef-agent"
          chmod +x "$LAYER_DIR/clef-agent/clef-agent"
          cp packages/agent/lambda/extensions/clef-agent "$LAYER_DIR/extensions/clef-agent"
          chmod +x "$LAYER_DIR/extensions/clef-agent"
          LAYER_ZIP="packages/agent/dist/clef-agent-lambda-${{ matrix.lambda_arch }}.zip"
          (cd "$LAYER_DIR" && zip -r - clef-agent extensions) > "$LAYER_ZIP"
          echo "Packaged Lambda Layer: $LAYER_ZIP"

      - name: Upload binary as workflow artifact (Linux only, for Docker build)
        if: startsWith(matrix.label, 'linux-')
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: packages/agent/dist/${{ matrix.asset }}

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          ASSETS=("packages/agent/dist/${{ matrix.asset }}" "packages/agent/dist/${{ matrix.asset }}.sha256")
          if [[ -n "${{ matrix.lambda_arch }}" ]]; then
            ASSETS+=("packages/agent/dist/clef-agent-lambda-${{ matrix.lambda_arch }}.zip")
          fi
          gh release upload "${{ needs.check-tag.outputs.tag }}" \
            "${ASSETS[@]}" \
            --clobber

  docker-agent:
    name: Docker Agent Image
    needs: [check-tag, build-agent]
    if: needs.check-tag.outputs.build_agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-tag.outputs.tag }}

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          path: packages/agent/docker-context
          pattern: clef-agent-linux-*
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x packages/agent/docker-context/clef-agent-linux-*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/clef-sh/agent
          tags: |
            type=semver,pattern={{version}},value=${{ needs.check-tag.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.check-tag.outputs.version }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ !contains(needs.check-tag.outputs.version, 'beta') }}
            type=raw,value=beta,enable=${{ contains(needs.check-tag.outputs.version, 'beta') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: packages/agent/docker-context
          file: packages/agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
