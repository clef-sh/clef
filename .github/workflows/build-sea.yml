# Build Single Executable Application (SEA) binaries for @clef-sh/cli
# and @clef-sh/agent, then attach them to the GitHub Release.
#
# Triggered when a release is published (stable or beta) or manually via
# workflow_dispatch for retroactively attaching binaries to an existing release.
#
# Stable releases use per-package tags (@clef-sh/cli@X.Y.Z, @clef-sh/agent@X.Y.Z).
# Beta releases use a shared tag (vX.Y.Z-beta.N) and build both CLI and agent.
#
# SEA embeds the host Node binary, so each platform/arch must build on a
# native runner. The CLI requires UI assets to be built first.

name: Build SEA Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach binaries to (e.g. v0.1.6-beta.18)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  check-tag:
    name: Check Tag
    runs-on: ubuntu-latest
    outputs:
      build_cli: ${{ steps.check.outputs.build_cli }}
      build_agent: ${{ steps.check.outputs.build_agent }}
      tag: ${{ steps.check.outputs.tag }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - id: check
        run: |
          TAG="${{ inputs.tag || github.event.release.tag_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          BUILD_CLI=false
          BUILD_AGENT=false
          VERSION=""
          # Beta tags build both CLI and agent
          if [[ "$TAG" =~ ^v(.+-beta\.[0-9]+)$ ]]; then
            BUILD_CLI=true
            BUILD_AGENT=true
            VERSION="${BASH_REMATCH[1]}"
          fi
          # Stable tags build only the matching package
          if [[ "$TAG" =~ ^@clef-sh/cli@(.+)$ ]]; then
            BUILD_CLI=true
            VERSION="${BASH_REMATCH[1]}"
          fi
          if [[ "$TAG" =~ ^@clef-sh/agent@(.+)$ ]]; then
            BUILD_AGENT=true
            VERSION="${BASH_REMATCH[1]}"
          fi
          echo "build_cli=$BUILD_CLI" >> "$GITHUB_OUTPUT"
          echo "build_agent=$BUILD_AGENT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-cli:
    name: CLI (${{ matrix.label }})
    needs: check-tag
    if: needs.check-tag.outputs.build_cli == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
            binary: clef
            asset: clef-linux-x64
          - label: linux-arm64
            os: ubuntu-24.04-arm
            binary: clef
            asset: clef-linux-arm64
          - label: darwin-x64
            os: macos-14
            binary: clef
            asset: clef-darwin-x64
          - label: darwin-arm64
            os: macos-latest
            binary: clef
            asset: clef-darwin-arm64
          - label: windows-x64
            os: windows-latest
            binary: clef.exe
            asset: clef-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-tag.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Stamp version
        if: needs.check-tag.outputs.version != ''
        shell: bash
        run: |
          VER="${{ needs.check-tag.outputs.version }}"
          for pkg in packages/core packages/runtime packages/cli packages/agent packages/ui; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg/package.json','utf8'));
              p.version = '$VER';
              fs.writeFileSync('$pkg/package.json', JSON.stringify(p, null, 2) + '\n');
            "
          done
          echo "Stamped version $VER"

      - name: Build packages
        shell: bash
        run: |
          npm run build -w packages/core
          npm run build -w packages/ui

      - name: Build SEA binary
        shell: bash
        run: npm run build:sea -w packages/cli

      - name: Rename binary for platform
        shell: bash
        run: mv "packages/cli/dist/${{ matrix.binary }}" "packages/cli/dist/${{ matrix.asset }}"

      - name: Generate checksum
        shell: bash
        run: |
          cd packages/cli/dist
          if command -v sha256sum &> /dev/null; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.check-tag.outputs.tag }}" \
            "packages/cli/dist/${{ matrix.asset }}" \
            "packages/cli/dist/${{ matrix.asset }}.sha256" \
            --clobber

  build-agent:
    name: Agent (${{ matrix.label }})
    needs: check-tag
    if: needs.check-tag.outputs.build_agent == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
            binary: clef-agent
            asset: clef-agent-linux-x64
          - label: linux-arm64
            os: ubuntu-24.04-arm
            binary: clef-agent
            asset: clef-agent-linux-arm64
          - label: darwin-x64
            os: macos-14
            binary: clef-agent
            asset: clef-agent-darwin-x64
          - label: darwin-arm64
            os: macos-latest
            binary: clef-agent
            asset: clef-agent-darwin-arm64
          - label: windows-x64
            os: windows-latest
            binary: clef-agent.exe
            asset: clef-agent-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-tag.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Stamp version
        if: needs.check-tag.outputs.version != ''
        shell: bash
        run: |
          VER="${{ needs.check-tag.outputs.version }}"
          for pkg in packages/core packages/runtime packages/agent; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg/package.json','utf8'));
              p.version = '$VER';
              fs.writeFileSync('$pkg/package.json', JSON.stringify(p, null, 2) + '\n');
            "
          done
          echo "Stamped version $VER"

      - name: Build packages
        shell: bash
        run: |
          npm run build -w packages/core
          npm run build -w packages/runtime

      - name: Build SEA binary
        shell: bash
        run: npm run build:sea -w packages/agent

      - name: Rename binary for platform
        shell: bash
        run: mv "packages/agent/dist/${{ matrix.binary }}" "packages/agent/dist/${{ matrix.asset }}"

      - name: Generate checksum
        shell: bash
        run: |
          cd packages/agent/dist
          if command -v sha256sum &> /dev/null; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.check-tag.outputs.tag }}" \
            "packages/agent/dist/${{ matrix.asset }}" \
            "packages/agent/dist/${{ matrix.asset }}.sha256" \
            --clobber
