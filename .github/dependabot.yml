version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      patch-updates:
        update-types:
          - patch
  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    groups:
      patch-updates:
        update-types:
          - patch
  - package-ecosystem: npm
    directory: /www
    schedule:
      interval: weekly
    groups:
      patch-updates:
        update-types:
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
