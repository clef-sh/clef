name: Publish sops platform packages

on:
  workflow_dispatch:
    inputs:
      sops_version:
        description: "sops version to package (e.g. 3.9.4)"
        required: true
        type: string
      dry_run:
        description: "Dry run (skip npm publish)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  download-and-publish:
    environment: prod
    strategy:
      matrix:
        include:
          - platform: darwin-arm64
            os: macos-latest
            sops_asset: darwin.arm64
            bin_name: sops
          - platform: darwin-x64
            os: macos-latest
            sops_asset: darwin.amd64
            bin_name: sops
          - platform: linux-x64
            os: ubuntu-latest
            sops_asset: linux.amd64
            bin_name: sops
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            sops_asset: linux.arm64
            bin_name: sops
          - platform: win32-x64
            os: windows-latest
            sops_asset: amd64.exe
            bin_name: sops.exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Verify sops-version.json matches input
        run: |
          PINNED=$(node -e "console.log(JSON.parse(require('fs').readFileSync('sops-version.json','utf-8')).version)")
          if [ "$PINNED" != "${{ inputs.sops_version }}" ]; then
            echo "::error::Input version ${{ inputs.sops_version }} does not match sops-version.json ($PINNED)"
            exit 1
          fi

      - name: Download sops binary
        run: node scripts/download-sops.mjs --platform ${{ matrix.platform }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify checksums file signature
        run: |
          SOPS_VER="${{ inputs.sops_version }}"
          BASE="https://github.com/getsops/sops/releases/download/v${SOPS_VER}/sops-v${SOPS_VER}"
          curl -fsSL "${BASE}.checksums.txt" -o checksums.txt
          curl -fsSL "${BASE}.checksums.pem" -o checksums.pem
          curl -fsSL "${BASE}.checksums.sig" -o checksums.sig
          cosign verify-blob checksums.txt \
            --certificate checksums.pem \
            --signature checksums.sig \
            --certificate-identity-regexp=https://github.com/getsops \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com

      - name: Verify binary against official checksums
        run: |
          ASSET="sops-v${{ inputs.sops_version }}.${{ matrix.sops_asset }}"
          BIN="platforms/sops-${{ matrix.platform }}/bin/${{ matrix.bin_name }}"
          node -e "
            const {createHash} = require('crypto');
            const {readFileSync} = require('fs');
            const checksums = readFileSync('checksums.txt', 'utf-8');
            const asset = '$ASSET';
            const line = checksums.split('\n').find(l => l.endsWith('  ' + asset));
            if (!line) { console.error('::error::No checksum entry for ' + asset); process.exit(1); }
            const expected = line.split('  ')[0];
            const actual = createHash('sha256').update(readFileSync('$BIN')).digest('hex');
            if (actual !== expected) {
              console.error('::error::Checksum mismatch for ' + asset);
              console.error('  expected: ' + expected);
              console.error('  got:      ' + actual);
              process.exit(1);
            }
            console.log('Checksum OK: ' + actual);
          "

      - name: Install slsa-verifier (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          OS=$([ "${{ runner.os }}" = "macOS" ] && echo "darwin" || echo "linux")
          ARCH=$([ "${{ runner.arch }}" = "ARM64" ] && echo "arm64" || echo "amd64")
          curl -fsSL \
            "https://github.com/slsa-framework/slsa-verifier/releases/download/v2.7.1/slsa-verifier-${OS}-${ARCH}" \
            -o /usr/local/bin/slsa-verifier
          chmod +x /usr/local/bin/slsa-verifier

      - name: Install slsa-verifier (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p "$USERPROFILE/.local/bin"
          curl -fsSL \
            "https://github.com/slsa-framework/slsa-verifier/releases/download/v2.7.1/slsa-verifier-windows-amd64.exe" \
            -o "$USERPROFILE/.local/bin/slsa-verifier.exe"
          echo "$USERPROFILE/.local/bin" >> "$GITHUB_PATH"

      - name: Verify SLSA provenance
        run: |
          curl -fsSL \
            "https://github.com/getsops/sops/releases/download/v${{ inputs.sops_version }}/sops-v${{ inputs.sops_version }}.intoto.jsonl" \
            -o provenance.jsonl
          slsa-verifier verify-artifact \
            "platforms/sops-${{ matrix.platform }}/bin/${{ matrix.bin_name }}" \
            --provenance-path provenance.jsonl \
            --source-uri github.com/getsops/sops \
            --source-tag v${{ inputs.sops_version }}

      - name: Verify binary runs
        run: |
          BIN="platforms/sops-${{ matrix.platform }}/bin/${{ matrix.bin_name }}"
          chmod +x "$BIN"
          "$BIN" --version

      - name: Copy LICENSE
        run: |
          # Download sops LICENSE from the release
          curl -fsSL "https://raw.githubusercontent.com/getsops/sops/v${{ inputs.sops_version }}/LICENSE" \
            -o "platforms/sops-${{ matrix.platform }}/LICENSE.sops"

      - name: Patch version from input
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('platforms/sops-${{ matrix.platform }}/package.json', 'utf8'));
            pkg.version = '${{ inputs.sops_version }}';
            fs.writeFileSync('platforms/sops-${{ matrix.platform }}/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Inspect OIDC claims (debug — remove after trust verified)
        if: ${{ !inputs.dry_run }}
        run: |
          TOKEN=$(curl -sLS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
            | jq -r .value)
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null \
            | jq '{sub, repository, workflow_ref, environment, ref, repository_owner}'

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        working-directory: platforms/sops-${{ matrix.platform }}
        run: npm publish --provenance --access public

      - name: Dry run — show package contents
        if: ${{ inputs.dry_run }}
        working-directory: platforms/sops-${{ matrix.platform }}
        run: npm pack --dry-run
