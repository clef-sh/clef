# Release workflow — publishes @clef-sh/core and @clef-sh/cli to npm
# and creates a GitHub Release with changelog notes.
#
# Authentication: uses GitHub Actions OIDC for npm publish (no NPM_TOKEN).
# Prerequisite: on npmjs.com, each published package (@clef-sh/core,
# @clef-sh/cli) must have publishing linked to this GitHub repository
# under Settings → "Configure trusted publishing".

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
