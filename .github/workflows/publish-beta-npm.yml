# Manual beta → npm promotion workflow
#
# Publishes the current staging versions to npm under the `beta` dist-tag
# with provenance attestations. Each package publishes whatever version is
# in its package.json (stamped by the publish-prerelease workflow).
#
# This is a manual gate: beta versions land on GitHub Packages automatically,
# and a human promotes them to npm when ready for open testing.
#
# Authentication: GitHub Actions OIDC — no long-lived npm token required.

name: Publish Beta to npm

on:
  workflow_dispatch:

permissions:
  contents: write # tag the promoted commit
  id-token: write # provenance attestations

jobs:
  promote:
    name: Promote staging to npm
    runs-on: ubuntu-latest
    environment: beta-npm

    steps:
      - uses: actions/checkout@v6
        with:
          ref: staging
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Read package versions
        id: ver
        run: |
          echo "core=$(node -p "require('./packages/core/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "cloud=$(node -p "require('./packages/cloud/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "analytics=$(node -p "require('./packages/analytics/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "runtime=$(node -p "require('./packages/runtime/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "agent=$(node -p "require('./packages/agent/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "broker=$(node -p "require('./packages/broker/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "cli=$(node -p "require('./packages/cli/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "ui=$(node -p "require('./packages/ui/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish @clef-sh/core
        continue-on-error: true
        working-directory: packages/core
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/core publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/cloud
        continue-on-error: true
        working-directory: packages/cloud
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/cloud publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/analytics
        continue-on-error: true
        working-directory: packages/analytics
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/analytics publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/runtime
        continue-on-error: true
        working-directory: packages/runtime
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/runtime publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/agent
        continue-on-error: true
        working-directory: packages/agent
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/agent publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/broker
        continue-on-error: true
        working-directory: packages/broker
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/broker publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/cli
        continue-on-error: true
        working-directory: packages/cli
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/cli publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/ui
        continue-on-error: true
        working-directory: packages/ui
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/ui publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag the promoted commit so it's traceable from npm back to source
      - name: Tag promoted commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLI_VER="${{ steps.ver.outputs.cli }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "npm-beta/v${CLI_VER}" -m "Promoted beta to npm"
          git push origin "npm-beta/v${CLI_VER}"

      - name: Update GitHub pre-release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLI_VER="${{ steps.ver.outputs.cli }}"
          if gh release view "v${CLI_VER}" &>/dev/null; then
            gh release edit "v${CLI_VER}" \
              --draft=false \
              --prerelease \
              --notes "Beta release. Published to npm.

          \`\`\`
          npm install @clef-sh/cli@beta
          \`\`\`"
          fi

      - name: Publish summary
        run: |
          echo "## Beta promoted to npm" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/core\` | \`${{ steps.ver.outputs.core }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/cloud\` | \`${{ steps.ver.outputs.cloud }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/analytics\` | \`${{ steps.ver.outputs.analytics }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/runtime\` | \`${{ steps.ver.outputs.runtime }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/agent\` | \`${{ steps.ver.outputs.agent }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/broker\` | \`${{ steps.ver.outputs.broker }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/cli\` | \`${{ steps.ver.outputs.cli }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/ui\` | \`${{ steps.ver.outputs.ui }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install: \`npm install @clef-sh/cli@beta\`" >> "$GITHUB_STEP_SUMMARY"
