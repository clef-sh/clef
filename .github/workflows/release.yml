# Release workflow — strips prerelease suffix, publishes to npm, creates one
# umbrella GitHub release, and triggers the SEA binary build.
#
# By the time code reaches main (via staging merge), package.json versions are
# already stamped as e.g. 0.1.8-beta.52. This workflow strips the -beta.N
# suffix, publishes the stable versions to npm, creates per-package git tags
# (still needed by publish-prerelease's next_version function), creates one
# umbrella GitHub Release at v<cli_version> listing all bumped packages, and
# calls build-sea.yml as a downstream job to attach the CLI + agent SEA bins.
#
# Triggers automatically when the CI workflow passes on main, or manually.
#
# Note on the build-bins downstream call: we use workflow_call rather than
# relying on the `release: published` event because events fired by
# GITHUB_TOKEN do not trigger downstream workflows (GitHub recursion guard).

name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  id-token: write
  actions: write # dispatch build-sea via gh workflow run + poll for completion

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Publish Stable
    runs-on: ubuntu-latest
    environment: prod
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Strip prerelease suffix from all packages and stamp stable versions.
      # If a package has no prerelease suffix (already stable), it is skipped.
      - name: Stamp stable versions
        id: versions
        run: |
          stamp_stable() {
            local DIR="$1"
            local NAME="$2"
            local CURRENT
            CURRENT=$(node -p "require('./${DIR}/package.json').version")
            local STABLE
            STABLE=$(echo "$CURRENT" | sed 's/-.*//')

            if [ "$CURRENT" = "$STABLE" ]; then
              echo "${NAME}: ${CURRENT} (already stable, skipping)"
              echo "${NAME}_released=false" >> "$GITHUB_OUTPUT"
              return
            fi

            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('${DIR}/package.json', 'utf8'));
              p.version = '${STABLE}';
              fs.writeFileSync('${DIR}/package.json', JSON.stringify(p, null, 2) + '\n');
            "
            echo "${NAME}: ${CURRENT} → ${STABLE}"
            echo "${NAME}_released=true" >> "$GITHUB_OUTPUT"
            echo "${NAME}_version=${STABLE}" >> "$GITHUB_OUTPUT"
          }

          stamp_stable packages/core      core
          stamp_stable packages/cloud     cloud
          stamp_stable packages/analytics analytics
          stamp_stable packages/runtime   runtime
          stamp_stable packages/broker    broker
          stamp_stable packages/agent     agent
          stamp_stable packages/cli       cli
          stamp_stable packages/ui        ui
          stamp_stable packages/client   client

      # ── Verify CLI was bumped (early gate) ───────────────────────────────
      #
      # CLI is the canonical version anchor for the umbrella release. If
      # cli_released is false (cli wasn't bumped this cycle), fail BEFORE
      # touching git or any registry.

      - name: Verify CLI was bumped
        if: steps.versions.outputs.cli_released != 'true'
        run: |
          echo "::error::@clef-sh/cli was not bumped in this release cycle."
          echo "::error::The umbrella release uses the CLI version as its tag."
          echo "::error::Either bump cli on staging before merging, or run release.yml manually with a fresh staging promotion."
          exit 1

      # ── Commit version stamps + per-package tags ────────────────────────

      - name: Commit stable versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only package.json files that changed
          git add packages/*/package.json
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi
          git commit -m "chore(release): stamp stable versions [skip ci]"
          git push

      - name: Create git tags
        run: |
          # Idempotent tag creation: skip if tag already exists locally OR
          # remotely (a re-run starts with a fresh checkout, so we have to
          # check both).
          tag_if_released() {
            local NAME="$1"
            local PKG="$2"
            local RELEASED="$3"
            local VERSION="$4"
            if [ "$RELEASED" != "true" ]; then
              return
            fi
            local TAG="@clef-sh/${PKG}-v${VERSION}"
            if git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "Tag ${TAG} already exists locally — skipping"
              return
            fi
            if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "Tag ${TAG} already exists on remote — fetching"
              git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" || true
              return
            fi
            git tag "$TAG"
            echo "Tagged: $TAG"
          }

          tag_if_released core    core    "${{ steps.versions.outputs.core_released }}"    "${{ steps.versions.outputs.core_version }}"
          tag_if_released cloud     cloud     "${{ steps.versions.outputs.cloud_released }}"     "${{ steps.versions.outputs.cloud_version }}"
          tag_if_released analytics analytics "${{ steps.versions.outputs.analytics_released }}" "${{ steps.versions.outputs.analytics_version }}"
          tag_if_released runtime   runtime   "${{ steps.versions.outputs.runtime_released }}"   "${{ steps.versions.outputs.runtime_version }}"
          tag_if_released broker  broker  "${{ steps.versions.outputs.broker_released }}"  "${{ steps.versions.outputs.broker_version }}"
          tag_if_released agent   agent   "${{ steps.versions.outputs.agent_released }}"   "${{ steps.versions.outputs.agent_version }}"
          tag_if_released cli     cli     "${{ steps.versions.outputs.cli_released }}"     "${{ steps.versions.outputs.cli_version }}"
          tag_if_released ui      ui      "${{ steps.versions.outputs.ui_released }}"      "${{ steps.versions.outputs.ui_version }}"
          tag_if_released client  client  "${{ steps.versions.outputs.client_released }}"  "${{ steps.versions.outputs.client_version }}"

          # Push only tags that don't yet exist on remote. The plain
          # `git push --tags` already skips existing matching tags but
          # fails the entire command if any single tag conflicts; loop
          # per-tag and warn rather than fail.
          for TAG in $(git tag --list); do
            git push origin "$TAG" 2>/dev/null || echo "::warning::Could not push tag $TAG (may already exist)"
          done

      # ── Create umbrella git tag ──────────────────────────────────────────
      #
      # We need a real git tag (not just a release object) because build-sea
      # checks the tag out via actions/checkout. `gh release create --draft`
      # does NOT push the underlying tag — draft releases hold the tag
      # internally and only push it when the release is published. So we
      # create and push the tag ourselves first, then the next step creates
      # a draft release that simply attaches to the existing tag.
      #
      # Idempotent: skip if the tag already exists locally or remotely.

      - name: Create umbrella git tag
        run: |
          CLI_VER="${{ steps.versions.outputs.cli_version }}"
          TAG="v${CLI_VER}"

          if git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists locally — skipping"
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on remote — fetching"
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" || true
            exit 0
          fi

          # main HEAD at this point is the stamped commit we just pushed.
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed umbrella tag: $TAG"

      # ── Create DRAFT umbrella release ───────────────────────────────────
      #
      # The release starts as a draft so build-sea can attach bins before
      # anything is publicly visible. The "Flip draft to published" step at
      # the end of this job does the public reveal AFTER bins are confirmed
      # built and npm publish has succeeded. The umbrella tag was already
      # created and pushed by the previous step.

      - name: Create draft umbrella GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLI_VER="${{ steps.versions.outputs.cli_version }}"
          TAG="v${CLI_VER}"

          # Idempotent: if the release already exists from a previous run
          # attempt, leave it alone. Whether it's a draft or already
          # published, the downstream steps below will treat it as the
          # canonical umbrella release.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $TAG already exists — leaving in place"
            exit 0
          fi

          # Build a markdown body listing every package that was bumped this cycle.
          {
            echo "## Packages"
            echo ""
            echo "| Package | Version |"
            echo "|---|---|"
            add_row() {
              local PKG="$1"
              local RELEASED="$2"
              local VERSION="$3"
              if [ "$RELEASED" = "true" ]; then
                echo "| \`@clef-sh/${PKG}\` | \`${VERSION}\` |"
              fi
            }
            add_row core      "${{ steps.versions.outputs.core_released }}"      "${{ steps.versions.outputs.core_version }}"
            add_row cloud     "${{ steps.versions.outputs.cloud_released }}"     "${{ steps.versions.outputs.cloud_version }}"
            add_row analytics "${{ steps.versions.outputs.analytics_released }}" "${{ steps.versions.outputs.analytics_version }}"
            add_row runtime   "${{ steps.versions.outputs.runtime_released }}"   "${{ steps.versions.outputs.runtime_version }}"
            add_row broker    "${{ steps.versions.outputs.broker_released }}"    "${{ steps.versions.outputs.broker_version }}"
            add_row agent     "${{ steps.versions.outputs.agent_released }}"     "${{ steps.versions.outputs.agent_version }}"
            add_row cli       "${{ steps.versions.outputs.cli_released }}"       "${{ steps.versions.outputs.cli_version }}"
            add_row ui        "${{ steps.versions.outputs.ui_released }}"        "${{ steps.versions.outputs.ui_version }}"
            add_row client    "${{ steps.versions.outputs.client_released }}"    "${{ steps.versions.outputs.client_version }}"
            echo ""
            echo "Install: \`npm install -g @clef-sh/cli\`"
            echo ""
            echo "CLI and agent SEA binaries (linux/darwin/windows × x64/arm64) plus the agent Lambda layer are attached below."
          } > /tmp/release-notes.md

          gh release create "$TAG" \
            --title "v${CLI_VER}" \
            --notes-file /tmp/release-notes.md \
            --draft
          echo "Created draft umbrella release: $TAG"

      # ── Dispatch SEA bins (background) ──────────────────────────────────
      #
      # Done BEFORE build/test so the SEA build runs in parallel with this
      # job's own build and test work. The "Wait for SEA build" step
      # further down blocks until the dispatched run finishes — by which
      # time it may already be done.
      #
      # We dispatch + poll because GITHUB_TOKEN can't fire `release:
      # published` downstream — workflow_dispatch is one of the two events
      # exempt from that restriction.
      #
      # Idempotent: short-circuit if every expected SEA bin is already on
      # the umbrella release. Avoids 20-min rebuilds on re-runs.

      - name: Dispatch SEA build (background)
        id: dispatch_sea
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLI_VER="${{ steps.versions.outputs.cli_version }}"
          TAG="v${CLI_VER}"

          # Idempotency check
          EXPECTED_ASSETS=(
            clef-linux-x64 clef-linux-arm64 clef-darwin-x64 clef-darwin-arm64 clef-windows-x64.exe
            clef-agent-linux-x64 clef-agent-linux-arm64 clef-agent-darwin-x64 clef-agent-darwin-arm64 clef-agent-windows-x64.exe
          )
          ASSETS=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || echo "")
          ALL_PRESENT=true
          for asset in "${EXPECTED_ASSETS[@]}"; do
            if ! echo "$ASSETS" | grep -qx "$asset"; then
              ALL_PRESENT=false
              break
            fi
          done
          if [ "$ALL_PRESENT" = "true" ]; then
            echo "All ${#EXPECTED_ASSETS[@]} SEA bins already attached to $TAG — skipping dispatch"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Capture the latest build-sea run ID before dispatching so the
          # later "Wait for SEA build" step can identify the run we triggered.
          BEFORE=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow build-sea.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // 0')
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"

          gh workflow run build-sea.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f tag="$TAG"
          echo "Dispatched build-sea for tag $TAG (running in background)"

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Wait for SEA build
        if: steps.dispatch_sea.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE="${{ steps.dispatch_sea.outputs.before }}"

          # Find the run ID we just dispatched (any new run with ID > BEFORE).
          NEW_RUN_ID=""
          for i in $(seq 1 30); do
            CURRENT=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow build-sea.yml \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // 0')
            if [ "$CURRENT" -gt "$BEFORE" ]; then
              NEW_RUN_ID="$CURRENT"
              break
            fi
            sleep 5
          done
          if [ -z "$NEW_RUN_ID" ]; then
            echo "::error::build-sea run did not appear within 2.5 minutes"
            exit 1
          fi
          echo "Tracking build-sea run: $NEW_RUN_ID"
          echo "URL: https://github.com/$GITHUB_REPOSITORY/actions/runs/$NEW_RUN_ID"

          for i in $(seq 1 180); do
            STATUS=$(gh run view "$NEW_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --json status,conclusion \
              --jq '.status')
            CONCLUSION=$(gh run view "$NEW_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --json status,conclusion \
              --jq '.conclusion // "pending"')

            if [ "$CONCLUSION" = "success" ]; then
              echo "build-sea succeeded ✓"
              exit 0
            elif [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ]; then
              echo "::error::build-sea $CONCLUSION — see https://github.com/$GITHUB_REPOSITORY/actions/runs/$NEW_RUN_ID"
              exit 1
            fi

            echo "build-sea status=$STATUS conclusion=$CONCLUSION (attempt $i/180)"
            sleep 20
          done
          echo "::error::Timed out waiting for build-sea after 60 minutes"
          exit 1

      # ── Publish to npm (public packages with provenance) ────────────────
      #
      # Runs AFTER bins are attached to the draft so that any SEA failure
      # has already aborted the workflow with no npm side effects.

      - name: Publish @clef-sh/core
        if: steps.versions.outputs.core_released == 'true'
        continue-on-error: true
        working-directory: packages/core
        run: npm publish --provenance --access public || echo "::warning::@clef-sh/core publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/cloud
        if: steps.versions.outputs.cloud_released == 'true'
        continue-on-error: true
        working-directory: packages/cloud
        run: npm publish --provenance --access public || echo "::warning::@clef-sh/cloud publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/analytics
        if: steps.versions.outputs.analytics_released == 'true'
        continue-on-error: true
        working-directory: packages/analytics
        run: npm publish --provenance --access public || echo "::warning::@clef-sh/analytics publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/runtime
        if: steps.versions.outputs.runtime_released == 'true'
        continue-on-error: true
        working-directory: packages/runtime
        run: npm publish --provenance --access public || echo "::warning::@clef-sh/runtime publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/broker
        if: steps.versions.outputs.broker_released == 'true'
        continue-on-error: true
        working-directory: packages/broker
        run: npm publish --provenance --access public || echo "::warning::@clef-sh/broker publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/agent
        if: steps.versions.outputs.agent_released == 'true'
        continue-on-error: true
        working-directory: packages/agent
        run: npm publish --provenance --access public || echo "::warning::@clef-sh/agent publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/cli
        if: steps.versions.outputs.cli_released == 'true'
        continue-on-error: true
        working-directory: packages/cli
        run: npm publish --provenance --access public || echo "::warning::@clef-sh/cli publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/ui
        if: steps.versions.outputs.ui_released == 'true'
        continue-on-error: true
        working-directory: packages/ui
        run: npm publish --provenance --access public || echo "::warning::@clef-sh/ui publish failed (may already exist)"

      - name: Publish @clef-sh/client
        if: steps.versions.outputs.client_released == 'true'
        continue-on-error: true
        working-directory: packages/client
        run: npm publish --provenance --access public || echo "::warning::@clef-sh/client publish failed (may already exist)"

      # ── Flip draft to published ─────────────────────────────────────────
      #
      # Final irreversible step: the umbrella release becomes publicly
      # visible. By this point: bins are attached, npm packages are live,
      # git tags are pushed. Flipping the draft is the moment users can
      # discover the release on the Releases page.

      - name: Flip draft umbrella release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLI_VER="${{ steps.versions.outputs.cli_version }}"
          TAG="v${CLI_VER}"

          # Idempotent: if the release is already published from a previous
          # run attempt, this is a no-op (gh release edit on an already-
          # published release with --draft=false succeeds quietly). The
          # check + log makes intent visible in the run output.
          IS_DRAFT=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')
          if [ "$IS_DRAFT" = "false" ]; then
            echo "Release $TAG is already published — nothing to flip"
            exit 0
          fi

          gh release edit "$TAG" \
            --draft=false \
            --latest
          echo "Published umbrella release: $TAG"
