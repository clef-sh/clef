# Manual beta → npm promotion workflow
#
# Publishes the current staging versions to npm under the `beta` dist-tag
# with provenance attestations. Each package publishes whatever version is
# in its package.json (stamped by the publish-prerelease workflow).
#
# This is a manual gate: beta versions land on GitHub Packages automatically,
# and a human promotes them to npm when ready for open testing.
#
# Authentication: classic NPM_TOKEN. npm only honours one trusted publisher
# per package and that slot is taken by release.yml (stable publishes), so
# the beta workflow uses a token. Provenance attestations still work via
# the id-token:write permission below.

name: Publish Beta to npm

on:
  workflow_dispatch:

permissions:
  contents: write # tag the promoted commit + edit the existing draft release
  id-token: write # provenance attestations

jobs:
  promote:
    name: Promote staging to npm
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v6
        with:
          ref: staging
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Defensive: staging should already have pins from publish-prerelease's
      # commit-back, but if this workflow is invoked against a branch where
      # that didn't happen, pin now so loose `*` specifiers don't leak to
      # npm. Not committed — this workflow never writes back.
      - name: Pin internal dep versions
        run: node scripts/stamp-internal-deps.mjs

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Read package versions
        id: ver
        run: |
          echo "core=$(node -p "require('./packages/core/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "cloud=$(node -p "require('./packages/cloud/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "analytics=$(node -p "require('./packages/analytics/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "runtime=$(node -p "require('./packages/runtime/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "agent=$(node -p "require('./packages/agent/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "broker=$(node -p "require('./packages/broker/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "cli=$(node -p "require('./packages/cli/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "ui=$(node -p "require('./packages/ui/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "client=$(node -p "require('./packages/client/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "cdk=$(node -p "require('./packages/cdk/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "param_store=$(node -p "require('./packages/pack/aws-parameter-store/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "secrets_manager=$(node -p "require('./packages/pack/aws-secrets-manager/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "design=$(node -p "require('./packages/design/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish @clef-sh/core
        continue-on-error: true
        working-directory: packages/core
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/core publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/cloud
        continue-on-error: true
        working-directory: packages/cloud
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/cloud publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/analytics
        continue-on-error: true
        working-directory: packages/analytics
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/analytics publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/runtime
        continue-on-error: true
        working-directory: packages/runtime
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/runtime publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/agent
        continue-on-error: true
        working-directory: packages/agent
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/agent publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/broker
        continue-on-error: true
        working-directory: packages/broker
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/broker publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/cli
        continue-on-error: true
        working-directory: packages/cli
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/cli publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/ui
        continue-on-error: true
        working-directory: packages/ui
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/ui publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/client
        continue-on-error: true
        working-directory: packages/client
        run: npm publish --tag beta --access public || echo "::warning::@clef-sh/client publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/cdk
        continue-on-error: true
        working-directory: packages/cdk
        run: npm publish --tag beta --access public --provenance || echo "::warning::@clef-sh/cdk publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/pack-aws-parameter-store
        continue-on-error: true
        working-directory: packages/pack/aws-parameter-store
        run: npm publish --tag beta --access public --provenance || echo "::warning::@clef-sh/pack-aws-parameter-store publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/pack-aws-secrets-manager
        continue-on-error: true
        working-directory: packages/pack/aws-secrets-manager
        run: npm publish --tag beta --access public --provenance || echo "::warning::@clef-sh/pack-aws-secrets-manager publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/design
        continue-on-error: true
        working-directory: packages/design
        run: npm publish --tag beta --access public --provenance || echo "::warning::@clef-sh/design publish failed (may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag the promoted commit so it's traceable from npm back to source
      - name: Tag promoted commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLI_VER="${{ steps.ver.outputs.cli }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "npm-beta/v${CLI_VER}" -m "Promoted beta to npm"
          git push origin "npm-beta/v${CLI_VER}"

      - name: Flip draft beta release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLI_VER="${{ steps.ver.outputs.cli }}"
          if ! gh release view "v${CLI_VER}" &>/dev/null; then
            echo "::error::Draft beta release v${CLI_VER} not found. Was publish-prerelease run on staging?"
            exit 1
          fi
          # SEA bins were attached to the draft during the staging push, so
          # flipping the draft is the only step needed to make the release
          # publicly visible. Notes are updated to mention the npm install
          # path; the assets are preserved.
          gh release edit "v${CLI_VER}" \
            --draft=false \
            --prerelease \
            --notes "Beta release. Published to npm.

          \`\`\`
          npm install @clef-sh/cli@beta
          \`\`\`

          CLI and agent SEA binaries (linux/darwin/windows × x64/arm64) plus the agent Lambda layer are attached below."
          echo "Published beta release: v${CLI_VER}"

      - name: Publish summary
        run: |
          echo "## Beta promoted to npm" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/core\` | \`${{ steps.ver.outputs.core }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/cloud\` | \`${{ steps.ver.outputs.cloud }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/analytics\` | \`${{ steps.ver.outputs.analytics }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/runtime\` | \`${{ steps.ver.outputs.runtime }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/agent\` | \`${{ steps.ver.outputs.agent }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/broker\` | \`${{ steps.ver.outputs.broker }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/cli\` | \`${{ steps.ver.outputs.cli }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/ui\` | \`${{ steps.ver.outputs.ui }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/client\` | \`${{ steps.ver.outputs.client }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/cdk\` | \`${{ steps.ver.outputs.cdk }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/pack-aws-parameter-store\` | \`${{ steps.ver.outputs.param_store }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/pack-aws-secrets-manager\` | \`${{ steps.ver.outputs.secrets_manager }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@clef-sh/design\` | \`${{ steps.ver.outputs.design }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install: \`npm install @clef-sh/cli@beta\`" >> "$GITHUB_STEP_SUMMARY"
          echo "SEA binaries attached to release \`v${{ steps.ver.outputs.cli }}\`" >> "$GITHUB_STEP_SUMMARY"
