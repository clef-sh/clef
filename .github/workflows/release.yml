# Release workflow — publishes @clef-sh/core, @clef-sh/agent, and @clef-sh/cli
# to npm independently, each versioned by its own commits.
#
# Release order: core → agent → cli.
# If core publishes a new version, cli's @clef-sh/core devDependency is bumped
# automatically, creating a commit that triggers cli's own semantic-release.
#
# Authentication: uses GitHub Actions OIDC for npm provenance.
# Each package has its own .releaserc.json extending semantic-release-monorepo.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Release @clef-sh/core
        id: core
        run: |
          BEFORE=$(node -p "require('./package.json').version")
          npx semantic-release
          AFTER=$(node -p "require('./package.json').version")
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$AFTER" >> "$GITHUB_OUTPUT"
          fi
        working-directory: packages/core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Release @clef-sh/agent
        id: agent
        run: |
          BEFORE=$(node -p "require('./package.json').version")
          npx semantic-release
          AFTER=$(node -p "require('./package.json').version")
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$AFTER" >> "$GITHUB_OUTPUT"
          fi
        working-directory: packages/agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Bump @clef-sh/core in cli
        if: steps.core.outputs.released == 'true'
        run: |
          NEW_VERSION="${{ steps.core.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/cli/package.json', 'utf8'));
            pkg.devDependencies['@clef-sh/core'] = '^${NEW_VERSION}';
            fs.writeFileSync('packages/cli/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/cli/package.json
          git commit -m "chore(cli): bump @clef-sh/core to ${NEW_VERSION} [skip ci]"

      - name: Release @clef-sh/cli
        run: npx semantic-release
        working-directory: packages/cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
