name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/core
      - run: npm run build --workspace=packages/ui
      - name: Test with coverage
        run: npm run test:coverage --workspaces --if-present
        # Fails automatically if Jest thresholds are breached.
        # Does not fail on coverage drops within thresholds.
      - name: Coverage summary
        if: always()
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          for pkg in packages/core packages/cli packages/ui packages/agent; do
            if [ -f "$pkg/coverage/coverage-summary.json" ]; then
              echo "### $pkg" >> $GITHUB_STEP_SUMMARY
              cat "$pkg/coverage/coverage-summary.json" | \
                node scripts/format-coverage-summary.js \
                >> $GITHUB_STEP_SUMMARY
            fi
          done
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: packages/*/coverage/

  format-check:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/core
      - run: npm run build --workspace=packages/ui
      - run: npm run build --workspace=packages/agent
      - run: npm run build --workspace=packages/cli

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: cd docs && npm ci
      - run: cd docs && npm run build

  www-build:
    name: WWW Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: cd www && npm ci
      - run: cd www && npm run build

  install-script-lint:
    name: Install Script Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate PowerShell script syntax
        shell: pwsh
        run: |
          $errors = $null
          $ast = [System.Management.Automation.Language.Parser]::ParseFile(
            "${{ github.workspace }}/www/public/install.ps1",
            [ref]$null,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            Write-Host "PowerShell parse errors found:" -ForegroundColor Red
            $errors | ForEach-Object { Write-Host "  $_" -ForegroundColor Red }
            exit 1
          }
          Write-Host "install.ps1 syntax is valid" -ForegroundColor Green
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path "${{ github.workspace }}/www/public/install.ps1" -Severity Error
          if ($results.Count -gt 0) {
            Write-Host "PSScriptAnalyzer errors:" -ForegroundColor Red
            $results | Format-Table -AutoSize
            exit 1
          }
          Write-Host "PSScriptAnalyzer passed" -ForegroundColor Green
  install-sh-lint:
    name: ShellCheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate shell script (shellcheck)
        run: shellcheck www/public/install.sh

  integration-test:
    name: Integration Tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      # Pin versions above REQUIREMENTS in packages/core/src/dependencies/checker.ts
      - name: Install SOPS
        run: |
          SOPS_VERSION=$(node -p "require('./sops-version.json').version")
          curl -Lo /usr/local/bin/sops https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64
          chmod +x /usr/local/bin/sops
          sops --version
      - run: npm ci
      - run: npm run build --workspace=packages/core
      - run: npm run build --workspace=packages/ui
      - run: npm run build --workspace=packages/agent
      - run: npm run build --workspace=packages/cli
      - run: npm run test:integration

  # Smoke test: single SEA+Linux on every PR for fast feedback.
  e2e-smoke:
    name: E2E Smoke (sea-linux-x64)
    needs: integration-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install SOPS
        run: |
          SOPS_VERSION=$(node -p "require('./sops-version.json').version")
          curl -Lo /usr/local/bin/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          chmod +x /usr/local/bin/sops
          sops --version
      - run: npm ci
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-smoke
          path: e2e/playwright-report/

  # Full matrix: all platforms × SEA + Node. Runs only on merge to main/staging/dev.
  e2e:
    name: E2E (${{ matrix.label }})
    needs: integration-test
    if: github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # SEA binary — every platform the CLI ships binaries for
          - label: sea-linux-x64
            runner: ubuntu-latest
            sops_asset: sops-v${SOPS_VERSION}.linux.amd64
            mode: sea
          - label: sea-linux-arm64
            runner: ubuntu-24.04-arm
            sops_asset: sops-v${SOPS_VERSION}.linux.arm64
            mode: sea
          - label: sea-macos-arm64
            runner: macos-latest
            sops_asset: sops-v${SOPS_VERSION}.darwin.arm64
            mode: sea
          - label: sea-windows-x64
            runner: windows-latest
            sops_asset: sops-v${SOPS_VERSION}.exe
            mode: sea
          # Pure Node.js (no SEA) — verifies the npm-installed path
          - label: node-linux-x64
            runner: ubuntu-latest
            sops_asset: sops-v${SOPS_VERSION}.linux.amd64
            mode: node
          - label: node-windows-x64
            runner: windows-latest
            sops_asset: sops-v${SOPS_VERSION}.exe
            mode: node
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install SOPS
        shell: bash
        run: |
          SOPS_VERSION=$(node -p "require('./sops-version.json').version")
          ASSET="${{ matrix.sops_asset }}"
          ASSET="${ASSET//\$\{SOPS_VERSION\}/$SOPS_VERSION}"
          URL="https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/${ASSET}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            curl -Lo "$RUNNER_TEMP/sops.exe" "$URL"
            echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
            "$RUNNER_TEMP/sops.exe" --version
          else
            curl -Lo /usr/local/bin/sops "$URL"
            chmod +x /usr/local/bin/sops
            sops --version
          fi

      - run: npm ci

      - name: Build packages
        shell: bash
        run: |
          npm run build -w packages/core
          npm run build -w packages/ui
          if [[ "${{ matrix.mode }}" == "sea" ]]; then
            npm run build:sea -w packages/cli
          else
            npm run build -w packages/cli
          fi

      - name: Install Playwright
        shell: bash
        run: |
          cd e2e && npm ci
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install chromium
          fi

      - name: Run E2E
        shell: bash
        env:
          CLEF_E2E_MODE: ${{ matrix.mode }}
        run: cd e2e && npx playwright test

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-${{ matrix.label }}
          path: e2e/playwright-report/
