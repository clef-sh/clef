# Release workflow — publishes @clef-sh/core and @clef-sh/cli to npm
# and creates a GitHub Release with changelog notes.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Extract changelog from tag
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md if it exists
          if [ -f CHANGELOG.md ]; then
            # Get content between this version header and the next version header
            BODY=$(awk "/^## .*${VERSION}/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
          fi
          if [ -z "$BODY" ]; then
            BODY="Release ${GITHUB_REF_NAME}"
          fi
          # Write to file to preserve newlines
          echo "$BODY" > release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md

      - name: Publish @clef-sh/core
        run: npm publish --provenance -w packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clef-sh/cli
        run: npm publish --provenance -w packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
