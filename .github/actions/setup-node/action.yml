name: Setup Node + npm ci
description: |
  Set up Node 24 and run `npm ci`. Uses actions/setup-node's built-in
  npm tarball cache (`cache: npm`) — that's platform-agnostic so it works
  cleanly across the multi-arch runner matrix without any special-casing.

  We deliberately don't cache `node_modules` itself: parallel matrix jobs
  don't shorten wall-clock by sharing it (each job materialises its own
  copy anyway), and packages with per-arch native binaries (esbuild,
  puppeteer chromium, ...) make a node_modules cache fragile across
  platforms. The tarball cache pays back the bulk of `npm ci` cost
  without any of that maintenance burden.

inputs:
  ignore-scripts:
    description: |
      Pass `--ignore-scripts` to npm ci. Used by lint / format / typecheck
      jobs as a security defense against malicious postinstall scripts —
      those jobs don't need any compiled native deps.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm

    - name: npm ci
      shell: bash
      run: |
        if [[ "${{ inputs.ignore-scripts }}" == "true" ]]; then
          npm ci --ignore-scripts --prefer-offline
        else
          npm ci --prefer-offline
        fi
